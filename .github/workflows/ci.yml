name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq

      - name: Bash syntax check
        run: |
          status=0
          for f in scripts/*.sh scripts/lib/*.sh; do
            if ! bash -n "$f"; then
              echo "FAIL: $f"
              status=1
            fi
          done
          exit $status

      - name: ShellCheck lint
        run: |
          shellcheck -S warning -x -e SC1091,SC1090,SC2034,SC2155 scripts/*.sh scripts/lib/*.sh

      - name: Run full test suite
        run: npm test

      - name: Preflight health check (informational)
        continue-on-error: true
        run: |
          chmod +x scripts/preflight_check.sh
          ./scripts/preflight_check.sh --quick
