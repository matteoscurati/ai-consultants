name: Publish

# Publishes to npm and creates the GitHub release when a v* tag is pushed.
#
# Authentication is npm Trusted Publishing (OIDC) — there is no NPM_TOKEN
# secret. It requires a one-time setup on npmjs.com:
#   npmjs.com/package/ai-consultants -> Settings -> Trusted Publisher
#     Publisher:          GitHub Actions
#     Organization/user:  matteoscurati
#     Repository:         ai-consultants
#     Workflow filename:  publish.yml     (exact, case-sensitive, with .yml)
#     Environment:        (leave empty)
#     Allowed actions:    npm publish
# Then harden: Settings -> Publishing access -> "Require two-factor
# authentication and disallow tokens". Trusted publishing keeps working; any
# leaked classic/automation token stops being able to publish.
#
# Once configured, `npm publish` below mints a short-lived token from the job's
# OIDC identity and attaches a provenance attestation automatically (public
# repo + public package). Requires npm >= 11.5.1 and Node >= 22.14.0.
#
# ci.yml only runs on branch pushes and PRs, so this workflow re-runs the full
# gate itself — a tag push is otherwise ungated.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Gate, publish to npm, create the GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # npm trusted publishing (OIDC) + provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the annotated tag object supplies the release title

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm meets the trusted-publishing floor
        # Pinned, not `npm@latest`: this job holds id-token: write, so an
        # unpinned global install would be arbitrary third-party code running
        # with npm-publish rights. Node 24 usually already satisfies the floor,
        # in which case nothing is installed at all.
        env:
          NPM_FLOOR: 11.5.1
        run: |
          set -euo pipefail
          current="$(npm -v)"
          if [ "$(printf '%s\n%s\n' "$NPM_FLOOR" "$current" | sort -V | head -1)" = "$NPM_FLOOR" ]; then
            echo "npm $current satisfies the >= $NPM_FLOOR floor."
          else
            echo "npm $current is below $NPM_FLOOR — installing npm@$NPM_FLOOR."
            npm install -g "npm@${NPM_FLOOR}"
          fi

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq

      - name: Resolve and verify the version
        id: version
        # GITHUB_REF_NAME reaches bash through the environment, never through
        # ${{ }} interpolation: git accepts backticks and $(...) in a tag name,
        # and this job can mint an npm publish token.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${TAG#v}"
          pkg_version="$(jq -r '.version' package.json)"
          # Validated before use: it is half of the equality check below, it is
          # interpolated into shell and into $GITHUB_OUTPUT, and semver is the
          # release contract everywhere else in this repo.
          if ! printf '%s' "$pkg_version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::package.json version '$pkg_version' is not semver X.Y.Z"
            exit 1
          fi
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $TAG does not match package.json version $pkg_version"
            exit 1
          fi
          note="docs/releases/v${pkg_version}.md"
          if [ ! -f "$note" ]; then
            echo "::error::Missing release note $note"
            exit 1
          fi
          if ! grep -qF "## [${pkg_version}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${pkg_version}]' entry"
            exit 1
          fi
          {
            echo "version=${pkg_version}"
            echo "tag=v${pkg_version}"
            echo "note=${note}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify the tag is on main
        # The client-side guard in finalize.sh is not the only thing standing
        # between a side-branch commit and an irreversible npm publish.
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::$GITHUB_SHA is not an ancestor of origin/main — refusing to publish"
            exit 1
          fi

      - name: Bash syntax check
        run: |
          status=0
          for f in scripts/*.sh scripts/lib/*.sh; do
            if ! bash -n "$f"; then
              echo "FAIL: $f"
              status=1
            fi
          done
          exit $status

      - name: ShellCheck lint
        run: npm run lint

      - name: Run full test suite
        run: npm test

      - name: Publish to npm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if npm view "ai-consultants@${VERSION}" version >/dev/null 2>&1; then
            echo "ai-consultants@${VERSION} is already on npm — skipping publish."
            exit 0
          fi
          npm publish

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          NOTE: ${{ steps.version.outputs.note }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it untouched."
            exit 0
          fi
          # The annotated tag's subject is the human-readable release title
          # (e.g. "v2.23.0 — remove dead self-reflection module"); fall back to
          # the bare tag for a lightweight tag.
          title="$(git tag -l --format='%(contents:subject)' "$TAG")"
          [ -n "$title" ] || title="$TAG"
          gh release create "$TAG" \
            --verify-tag \
            --title "$title" \
            --notes-file "$NOTE"
